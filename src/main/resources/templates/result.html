<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Currency Converter - Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
        }
        .card {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        .amount-from {
            font-size: 20px;
        }
        .amount-result {
            font-size: 32px;
            color: #27ae60;
            font-weight: bold;
            margin: 10px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            font-size: 15px;
        }
        .error {
            color: #e74c3c;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="card">

    <!-- Error -->
    <div th:if="${error}">
        <p class="error">❌ Error communicating with the API. Please try again later.</p>
        <a class="back-link" href="/">⬅️ Back</a>
    </div>

    <!-- Resultat -->
    <div th:unless="${error}">
        <h1 th:text="${resultTitle}">📊 Resultat</h1>
        <p class="amount-from">
            <strong th:text="${amount + ' ' + from}">1.0 EUR</strong> =
        </p>
        <p class="amount-result" th:text="${result + ' ' + to}">1.00 USD</p>
        <a class="back-link" th:href="@{/}" th:text="${backText}">⬅️ Tornar</a>
    </div>

</div>
</body>
</html>
